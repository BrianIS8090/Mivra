name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Тег релиза (например v0.6.6). Будет создан, если не существует.'
        required: true
        type: string

jobs:
  prepare-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
    steps:
      - name: Resolve release tag
        id: meta
        run: echo "tag_name=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Create or find release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
        run: |
          release_id="$(gh release view "$TAG_NAME" --json databaseId --jq .databaseId 2>/dev/null || true)"

          if [ -z "$release_id" ]; then
            cat > release-notes.md <<EOF
          ## Mivra $TAG_NAME

          Скачайте установщик для вашей платформы ниже.

          | Платформа | Файл |
          |-----------|------|
          | Windows | `.exe` |
          | macOS (Apple Silicon) | `.dmg` (aarch64) |
          | macOS (Intel) | `.dmg` (x64) |
          | Linux | `.deb`, `.AppImage` |
          EOF

            gh release create "$TAG_NAME" \
              --title "Mivra $TAG_NAME" \
              --notes-file release-notes.md \
              --target "$GITHUB_SHA"

            release_id="$(gh release view "$TAG_NAME" --json databaseId --jq .databaseId)"
          fi

          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

  release:
    needs: prepare-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: ${{ needs.prepare-release.outputs.tag_name }}
          releaseName: "Mivra ${{ needs.prepare-release.outputs.tag_name }}"
          releaseBody: |
            ## Mivra ${{ needs.prepare-release.outputs.tag_name }}

            Скачайте установщик для вашей платформы ниже.

            | Платформа | Файл |
            |-----------|------|
            | Windows | `.exe` |
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | macOS (Intel) | `.dmg` (x64) |
            | Linux | `.deb`, `.AppImage` |
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
