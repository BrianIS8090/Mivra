name: CI

on:
  push:
    branches-ignore:
      - 'release/**'
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & test
    # Только Windows: проект ориентирован на Windows-сборку, релизный
    # workflow в release.yml уже покрывает кросс-платформенный bundle.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Run vitest
        run: npm test

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check

      - name: Cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Regenerate Tauri-Specta bindings
        run: npm run gen:types

      - name: Verify src/bindings.ts is committed and up to date
        shell: bash
        run: |
          if ! git diff --exit-code src/bindings.ts; then
            echo "::error::src/bindings.ts отстал от Rust-команд. Запустите 'npm run gen:types' локально и закоммитьте результат."
            exit 1
          fi
